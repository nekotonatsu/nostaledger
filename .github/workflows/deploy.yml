name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: pdo, pdo_sqlite, mbstring, zip, bcmath, gd, pcntl, exif
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Create test database
        run: touch database/testing.sqlite

      - name: Run tests
        run: php artisan test

  build-frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  deploy:
    needs: [test, build-frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install rsync and sshpass
        run: sudo apt-get install -y rsync sshpass

      - name: Deploy files to VPS
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          rsync -a \
            -e "sshpass -p '${VPS_PASSWORD}' ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no -o PubkeyAuthentication=no" \
            --exclude='.git' \
            --exclude='backend/vendor' \
            --exclude='backend/.env' \
            --exclude='backend/storage/logs/*' \
            --exclude='backend/database/database.sqlite' \
            --exclude='backend/database/testing.sqlite' \
            ./ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/nostaledger/

      - name: Build and migrate on VPS
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "${VPS_PASSWORD}" ssh \
            -p ${{ secrets.VPS_PORT }} \
            -o StrictHostKeyChecking=no \
            -o PubkeyAuthentication=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /var/www/nostaledger && \
             docker compose -f docker-compose.prod.yml build --no-cache backend frontend && \
             docker compose -f docker-compose.prod.yml up -d && \
             sleep 15 && \
             docker compose -f docker-compose.prod.yml exec -T backend php artisan migrate --force"
